<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interní Výběr Káv | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans min-h-screen">

    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-xl shadow-md border border-stone-200 max-w-md w-full">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-amber-800 mb-2">☕ Výběr káv</h1>
                <p class="text-stone-500">Pro pokračování se prosím přihlas.</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-700">E-mail</label>
                    <input type="email" id="emailInput" class="mt-1 w-full p-3 border border-stone-300 rounded focus:ring-amber-500 focus:border-amber-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700">Heslo</label>
                    <input type="password" id="passwordInput" class="mt-1 w-full p-3 border border-stone-300 rounded focus:ring-amber-500 focus:border-amber-500" required>
                </div>
                <div id="loginError" class="text-red-600 text-sm hidden bg-red-50 p-2 rounded">Špatný e-mail nebo heslo.</div>
                <button type="submit" class="w-full bg-amber-700 text-white p-3 rounded font-bold hover:bg-amber-800 transition shadow-sm">
                    Přihlásit se
                </button>
            </form>
        </div>
    </div>

    <div id="mainApp" class="max-w-5xl mx-auto p-6 md:p-12 hidden">
        
        <header class="mb-8 border-b border-stone-300 pb-4 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-amber-800">☕ Výběr káv - Sety pražíren</h1>
                <p class="text-stone-500 mt-2" id="userGreeting">Přihlášen jako: ...</p>
            </div>
            <button id="logoutBtn" class="bg-stone-200 hover:bg-stone-300 text-stone-700 font-medium py-2 px-4 rounded-lg transition border border-stone-300 shadow-sm">
                Odhlásit se
            </button>
        </header>

        <section id="adminSection" class="bg-white p-6 rounded-lg shadow-sm border border-amber-300 mb-8 hidden relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
            <h2 class="text-xl font-semibold text-stone-800 border-b border-stone-200 pb-2 mb-6">⚙️ Admin: Přidat nový set (3 kávy)</h2>
            
            <form id="roasteryForm" class="space-y-6">
                <div>
                    <label class="block text-lg font-bold text-amber-700">Název pražírny</label>
                    <input type="text" id="roasteryName" class="mt-1 w-full p-3 border border-amber-300 rounded focus:ring-amber-500 focus:border-amber-500 bg-amber-50 font-medium" required>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-stone-50 p-4 rounded border border-stone-200 space-y-3">
                        <h3 class="font-bold text-stone-700">1. Káva</h3>
                        <input type="text" id="c1_name" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Název" required>
                        <input type="text" id="c1_origin" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Země a region" required>
                        <input type="text" id="c1_variety" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Odrůda" required>
                        <select id="c1_process" class="w-full p-2 border border-stone-300 rounded text-sm">
                            <option>Promyté (Washed)</option><option>Naturální (Natural)</option><option>Anaerobní / Experimentální</option><option>Honey</option>
                        </select>
                        <input type="number" step="0.01" id="c1_price" class="w-full p-2 border border-stone-300 rounded text-sm text-amber-700 font-medium" placeholder="Cena za g (Kč)" required>
                        <textarea id="c1_notes" rows="2" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Poznámky..."></textarea>
                    </div>

                    <div class="bg-stone-50 p-4 rounded border border-stone-200 space-y-3">
                        <h3 class="font-bold text-stone-700">2. Káva</h3>
                        <input type="text" id="c2_name" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Název" required>
                        <input type="text" id="c2_origin" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Země a region" required>
                        <input type="text" id="c2_variety" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Odrůda" required>
                        <select id="c2_process" class="w-full p-2 border border-stone-300 rounded text-sm">
                            <option>Promyté (Washed)</option><option>Naturální (Natural)</option><option>Anaerobní / Experimentální</option><option>Honey</option>
                        </select>
                        <input type="number" step="0.01" id="c2_price" class="w-full p-2 border border-stone-300 rounded text-sm text-amber-700 font-medium" placeholder="Cena za g (Kč)" required>
                        <textarea id="c2_notes" rows="2" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Poznámky..."></textarea>
                    </div>

                    <div class="bg-stone-50 p-4 rounded border border-stone-200 space-y-3">
                        <h3 class="font-bold text-stone-700">3. Káva</h3>
                        <input type="text" id="c3_name" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Název" required>
                        <input type="text" id="c3_origin" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Země a region" required>
                        <input type="text" id="c3_variety" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Odrůda" required>
                        <select id="c3_process" class="w-full p-2 border border-stone-300 rounded text-sm">
                            <option>Promyté (Washed)</option><option>Naturální (Natural)</option><option>Anaerobní / Experimentální</option><option>Honey</option>
                        </select>
                        <input type="number" step="0.01" id="c3_price" class="w-full p-2 border border-stone-300 rounded text-sm text-amber-700 font-medium" placeholder="Cena za g (Kč)" required>
                        <textarea id="c3_notes" rows="2" class="w-full p-2 border border-stone-300 rounded text-sm" placeholder="Poznámky..."></textarea>
                    </div>
                </div>

                <div class="pt-4 border-t border-stone-200">
                    <button type="submit" class="w-full md:w-auto bg-amber-700 text-white px-8 py-3 rounded font-bold hover:bg-amber-800 transition shadow-sm">
                        + Přidat set do cloudu
                    </button>
                </div>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-semibold text-stone-800 mb-4">Aktuální nabídka</h2>
            <div class="space-y-8" id="roasteryList">
                <div class="text-center text-stone-400 py-10">Načítám data z databáze...</div>
            </div>
        </section>

    </div>

    <script type="module">
        // 1. Zavedení modulů Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // TADY SI NASTAV SVŮJ ADMIN E-MAIL (Musí se shodovat s účtem, který si vytvoříš v konzoli)
        const ADMIN_EMAIL = "hradskydavid06@gmail.com"; 

        // 2. Tvoje konfigurace
        const firebaseConfig = {
            apiKey: "AIzaSyD4EELQxfjdbmAnbFCegwbc_km-xrzTTuw",
            authDomain: "poppyaplikace.firebaseapp.com",
            projectId: "poppyaplikace",
            storageBucket: "poppyaplikace.firebasestorage.app",
            messagingSenderId: "201291289880",
            appId: "1:201291289880:web:c633d79a2853bf8475fa6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Proměnné pro aplikaci
        let currentUser = null;
        let isAdmin = false;

        // UI Elementy
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginForm = document.getElementById('loginForm');
        const adminSection = document.getElementById('adminSection');
        const roasteryList = document.getElementById('roasteryList');

        // --- AUTHENTIKACE ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                isAdmin = (user.email === ADMIN_EMAIL);
                
                document.getElementById('userGreeting').innerText = `Přihlášen jako: ${user.email} ${isAdmin ? '(Admin)' : ''}`;
                
                if(isAdmin) adminSection.classList.remove('hidden');
                else adminSection.classList.add('hidden');

                loginScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');

                loadDataFromCloud();
            } else {
                currentUser = null;
                isAdmin = false;
                loginScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passwordInput').value;
            
            signInWithEmailAndPassword(auth, email, pass).catch((error) => {
                document.getElementById('loginError').classList.remove('hidden');
            });
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
            document.getElementById('loginError').classList.add('hidden');
        });

        // --- DATABÁZE A VYKRESLOVÁNÍ ---
        function loadDataFromCloud() {
            const setsRef = collection(db, "roasterySets");
            
            // onSnapshot naslouchá změnám v reálném čase
            onSnapshot(setsRef, (snapshot) => {
                const blocks = [];
                snapshot.forEach((doc) => {
                    blocks.push({ id: doc.id, ...doc.data() });
                });
                
                // Seřazení podle palců nahoru
                blocks.sort((a, b) => b.votesUp - a.votesUp);
                renderRoasteries(blocks);
            });
        }

        function generateCoffeeHTML(coffee, index) {
            return `
                <div class="bg-stone-50 p-4 rounded border border-stone-200 flex flex-col justify-between relative">
                    <div class="absolute top-4 right-4 bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded shadow-sm border border-amber-200">
                        ${coffee.price} Kč / g
                    </div>
                    <div>
                        <div class="text-xs font-bold text-amber-600 mb-1">KÁVA ${index}</div>
                        <h4 class="font-bold text-stone-800 text-base mb-2 pr-12">${coffee.name}</h4>
                        <div class="mt-2 text-sm text-stone-600 space-y-1">
                            <div class="flex items-start"><span class="mr-2">🌍</span> <span>${coffee.origin}</span></div>
                            <div class="flex items-start"><span class="mr-2">🧬</span> <span>${coffee.variety}</span></div>
                            <div class="flex items-start"><span class="mr-2">⚙️</span> <span>${coffee.process}</span></div>
                        </div>
                    </div>
                    ${coffee.notes ? `<div class="mt-3 text-sm text-stone-700 italic border-t border-stone-200 pt-2 font-medium">"${coffee.notes}"</div>` : ''}
                </div>
            `;
        }

        function renderRoasteries(blocks) {
            roasteryList.innerHTML = ''; 
            
            if(blocks.length === 0) {
                roasteryList.innerHTML = '<div class="text-center text-stone-500 py-10 border border-dashed border-stone-300 rounded">Zatím nebyly přidány žádné kávy.</div>';
                return;
            }

            blocks.forEach(block => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-lg shadow-sm border border-stone-300 overflow-hidden";
                
                // Kontrola, zda pole hlasujících existuje a zda v něm je aktuální uživatel
                const votedUsers = block.votedBy || [];
                const hasVoted = votedUsers.includes(currentUser.uid);
                
                const upBtnClass = hasVoted 
                    ? "flex items-center space-x-2 text-stone-400 bg-stone-100 px-4 py-2 rounded cursor-not-allowed border border-stone-200" 
                    : "flex items-center space-x-2 text-green-700 hover:bg-green-200 bg-green-100 px-4 py-2 rounded transition shadow-sm";
                
                const downBtnClass = hasVoted 
                    ? "flex items-center space-x-2 text-stone-400 bg-stone-100 px-4 py-2 rounded cursor-not-allowed border border-stone-200" 
                    : "flex items-center space-x-2 text-red-700 hover:bg-red-200 bg-red-100 px-4 py-2 rounded transition shadow-sm";

                const deleteButtonHTML = isAdmin 
                    ? `<button onclick="window.deleteBlock('${block.id}')" class="text-stone-300 hover:text-red-500 bg-stone-50 p-2 rounded border border-stone-200 text-sm">🗑️ Smazat set</button>` 
                    : '';

                card.innerHTML = `
                    <div class="p-6 border-l-8 border-l-amber-600">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="text-2xl font-bold text-stone-800">${block.roasteryName}</h3>
                            ${deleteButtonHTML}
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            ${generateCoffeeHTML(block.coffees[0], 1)}
                            ${generateCoffeeHTML(block.coffees[1], 2)}
                            ${generateCoffeeHTML(block.coffees[2], 3)}
                        </div>
                    </div>
                    
                    <div class="bg-stone-100 p-4 flex justify-between items-center border-t border-stone-300">
                        <div class="text-sm text-stone-500 font-medium">
                            ${hasVoted ? '✅ Tvůj hlas byl zaznamenán' : 'Hlasování pro tento set:'}
                        </div>
                        <div class="flex space-x-3">
                            <button ${hasVoted ? 'disabled' : `onclick="window.vote('${block.id}', 'up')"`} class="${upBtnClass}">
                                <span class="text-xl">👍</span>
                                <span class="font-bold text-lg">${block.votesUp || 0}</span>
                            </button>
                            
                            <button ${hasVoted ? 'disabled' : `onclick="window.vote('${block.id}', 'down')"`} class="${downBtnClass}">
                                <span class="text-xl">👎</span>
                                <span class="font-bold text-lg">${block.votesDown || 0}</span>
                            </button>
                        </div>
                    </div>
                `;
                roasteryList.appendChild(card);
            });
        }

        // --- PŘIDÁVÁNÍ DAT DO CLOUDU ---
        document.getElementById('roasteryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!isAdmin) return;

            const newBlock = {
                roasteryName: document.getElementById('roasteryName').value,
                votesUp: 0,
                votesDown: 0,
                votedBy: [], // Sem se budou zapisovat ID lidí, co hlasovali
                coffees: [
                    {
                        name: document.getElementById('c1_name').value, origin: document.getElementById('c1_origin').value,
                        variety: document.getElementById('c1_variety').value, process: document.getElementById('c1_process').value,
                        price: document.getElementById('c1_price').value, notes: document.getElementById('c1_notes').value
                    },
                    {
                        name: document.getElementById('c2_name').value, origin: document.getElementById('c2_origin').value,
                        variety: document.getElementById('c2_variety').value, process: document.getElementById('c2_process').value,
                        price: document.getElementById('c2_price').value, notes: document.getElementById('c2_notes').value
                    },
                    {
                        name: document.getElementById('c3_name').value, origin: document.getElementById('c3_origin').value,
                        variety: document.getElementById('c3_variety').value, process: document.getElementById('c3_process').value,
                        price: document.getElementById('c3_price').value, notes: document.getElementById('c3_notes').value
                    }
                ]
            };

            try {
                await addDoc(collection(db, "roasterySets"), newBlock);
                document.getElementById('roasteryForm').reset(); 
            } catch (error) {
                console.error("Chyba při přidávání: ", error);
            }
        });

        // Musíme fce vystavit pro HTML onclick pomocí window objektu
        window.vote = async function(id, type) {
            if (!currentUser) return;
            const docRef = doc(db, "roasterySets", id);
            
            try {
                // Bezpečný způsob zápisu do cloudu: zvýší číslo o 1 a přidá uživatele do pole, 
                // aby se předešlo chybě, když dva lidé hlasují ve stejnou vteřinu
                if (type === 'up') {
                    await updateDoc(docRef, { votesUp: increment(1), votedBy: arrayUnion(currentUser.uid) });
                } else if (type === 'down') {
                    await updateDoc(docRef, { votesDown: increment(1), votedBy: arrayUnion(currentUser.uid) });
                }
            } catch (error) {
                console.error("Chyba při hlasování: ", error);
            }
        };

        window.deleteBlock = async function(id) {
            if(!isAdmin) return;
            if(confirm('Opravdu chceš tento set smazat pro všechny?')) {
                await deleteDoc(doc(db, "roasterySets", id));
            }
        };
    </script>
</body>
</html>
