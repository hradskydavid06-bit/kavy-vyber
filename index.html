<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poppy Beans | OS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        poppy: { 700: '#b91c1c', 800: '#991b1b' },
                        brand: { dark: '#09090b', muted: '#71717a', border: '#e4e4e7', bg: '#fafafa' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #fafafa; }
        .input-minimal { background: transparent; border: 1px solid #e4e4e7; border-radius: 4px; padding: 0.75rem 1rem; transition: all 0.2s; width: 100%; }
        .input-minimal:focus { outline: none; border-color: #09090b; box-shadow: 0 0 0 1px #09090b; }
        .tab-active { border-bottom: 2px solid #b91c1c; color: #b91c1c; font-weight: 800; }
        .tab-inactive { color: #71717a; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="text-brand-dark font-sans min-h-screen antialiased">

    <div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-poppy-700"></div>
        <div class="bg-white p-10 border border-brand-border max-w-md w-full">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold tracking-tight mb-2 uppercase">Poppy Beans</h1>
                <p class="text-xs font-bold tracking-widest text-brand-muted uppercase">Internal System</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <input type="email" id="emailInput" class="input-minimal" placeholder="E-mail" required>
                <input type="password" id="passwordInput" class="input-minimal" placeholder="Heslo" required>
                <div id="loginError" class="text-poppy-700 text-sm hidden font-medium text-center">Přihlášení se nezdařilo.</div>
                <button type="submit" class="w-full bg-brand-dark text-white p-3 font-bold hover:bg-black transition uppercase tracking-wider">Vstoupit</button>
            </form>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto p-6 md:p-12 hidden">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center border-b border-brand-border pb-6 gap-6">
            <h1 class="text-3xl font-extrabold uppercase tracking-tight">Poppy Beans</h1>
            <nav class="flex gap-8 text-sm uppercase tracking-widest font-bold">
                <button onclick="switchTab('tab-cupping')" id="btn-tab-cupping" class="tab-active py-2">Cuppingy</button>
                <button onclick="switchTab('tab-kavy')" id="btn-tab-kavy" class="tab-inactive py-2">Výběr Kávy</button>
                <button onclick="switchTab('tab-recepty')" id="btn-tab-recepty" class="tab-inactive py-2">Recepty</button>
            </nav>
            <div class="flex items-center gap-4 text-xs font-bold">
                <span id="userGreeting" class="text-brand-muted uppercase"></span>
                <button id="logoutBtn" class="text-poppy-700 hover:underline uppercase">Odhlásit</button>
            </div>
        </header>

        <section id="tab-cupping" class="tab-content">
            <div id="admin-cupping-form" class="bg-white p-6 border border-brand-border mb-10 hidden">
                <h2 class="font-bold uppercase mb-4 text-poppy-700">Vypsat nový cupping</h2>
                <form id="cuppingForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="cup_title" class="input-minimal" placeholder="Název cuppingu" required>
                    <input type="date" id="cup_date" class="input-minimal" required>
                    <input type="time" id="cup_time" class="input-minimal" required>
                    <button type="submit" class="bg-brand-dark text-white font-bold p-2 uppercase text-xs">Vytvořit událost</button>
                </form>
            </div>
            <div id="cuppingList" class="grid grid-cols-1 gap-8"></div>
        </section>

        <section id="tab-kavy" class="tab-content hidden">
            <div id="admin-coffee-form" class="bg-white p-6 border border-brand-border mb-10 hidden">
                <h2 class="font-bold uppercase mb-6 text-poppy-700 text-sm">Nový výběrový set (3 vzorky)</h2>
                <form id="roasteryForm" class="space-y-6">
                    <input type="text" id="roasteryName" class="input-minimal font-bold text-lg" placeholder="Pražírna / Dodavatel" required>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="p-4 border border-brand-border space-y-2">
                            <h3 class="text-[10px] font-bold uppercase text-brand-muted">Vzorek 1</h3>
                            <input type="text" id="c1_name" class="input-minimal text-xs" placeholder="Název" required>
                            <input type="text" id="c1_origin" class="input-minimal text-xs" placeholder="Původ" required>
                            <input type="text" id="c1_variety" class="input-minimal text-xs" placeholder="Odrůda" required>
                            <input type="number" step="0.01" id="c1_price" class="input-minimal text-xs" placeholder="Kč/g" required>
                            <textarea id="c1_notes" class="input-minimal text-xs h-16" placeholder="Chuť..."></textarea>
                        </div>
                        <div class="p-4 border border-brand-border space-y-2">
                            <h3 class="text-[10px] font-bold uppercase text-brand-muted">Vzorek 2</h3>
                            <input type="text" id="c2_name" class="input-minimal text-xs" placeholder="Název" required>
                            <input type="text" id="c2_origin" class="input-minimal text-xs" placeholder="Původ" required>
                            <input type="text" id="c2_variety" class="input-minimal text-xs" placeholder="Odrůda" required>
                            <input type="number" step="0.01" id="c2_price" class="input-minimal text-xs" placeholder="Kč/g" required>
                            <textarea id="c2_notes" class="input-minimal text-xs h-16" placeholder="Chuť..."></textarea>
                        </div>
                        <div class="p-4 border border-brand-border space-y-2">
                            <h3 class="text-[10px] font-bold uppercase text-brand-muted">Vzorek 3</h3>
                            <input type="text" id="c3_name" class="input-minimal text-xs" placeholder="Název" required>
                            <input type="text" id="c3_origin" class="input-minimal text-xs" placeholder="Původ" required>
                            <input type="text" id="c3_variety" class="input-minimal text-xs" placeholder="Odrůda" required>
                            <input type="number" step="0.01" id="c3_price" class="input-minimal text-xs" placeholder="Kč/g" required>
                            <textarea id="c3_notes" class="input-minimal text-xs h-16" placeholder="Chuť..."></textarea>
                        </div>
                    </div>
                    <button type="submit" class="bg-brand-dark text-white font-bold px-8 py-3 uppercase text-xs hover:bg-black transition">Uložit k hlasování</button>
                </form>
            </div>
            <div id="roasteryList" class="space-y-10"></div>
        </section>

        <section id="tab-recepty" class="tab-content hidden">
            <div id="admin-recipe-form" class="bg-white p-6 border border-brand-border mb-10 hidden">
                <h2 class="font-bold uppercase mb-4 text-poppy-700">Sdílet nový recept</h2>
                <form id="recipeForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="rec_bean" class="input-minimal text-sm" placeholder="Káva / Zpracování" required>
                    <select id="rec_method" class="input-minimal text-sm">
                        <option>V60</option><option>Aeropress</option><option>Espresso</option><option>Chemex</option><option>Batch Brew</option>
                    </select>
                    <input type="text" id="rec_ratio" class="input-minimal text-sm" placeholder="Ratio (např. 18g/300ml)" required>
                    <button type="submit" class="bg-brand-dark text-white font-bold p-2 uppercase text-xs hover:bg-black transition">Přidat recept</button>
                    <div class="md:col-span-4">
                        <textarea id="rec_steps" class="input-minimal h-24 text-sm" placeholder="Postup (mletí, teplota, časy...)"></textarea>
                    </div>
                </form>
            </div>
            <div id="recipeList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const ADMIN_EMAIL = "hradskydavid06@gmail.com"; 
        const firebaseConfig = {
            apiKey: "AIzaSyD4EELQxfjdbmAnbFCegwbc_km-xrzTTuw",
            authDomain: "poppyaplikace.firebaseapp.com",
            projectId: "poppyaplikace",
            storageBucket: "poppyaplikace.firebasestorage.app",
            messagingSenderId: "201291289880",
            appId: "1:201291289880:web:c633d79a2853bf8475fa6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let isAdmin = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                isAdmin = (user.email === ADMIN_EMAIL);
                document.getElementById('userGreeting').innerText = user.email;
                
                if(isAdmin) {
                    document.getElementById('admin-cupping-form').classList.remove('hidden');
                    document.getElementById('admin-coffee-form').classList.remove('hidden');
                    document.getElementById('admin-recipe-form').classList.remove('hidden');
                }

                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('emailInput').value, document.getElementById('passwordInput').value)
                .catch(() => document.getElementById('loginError').classList.remove('hidden'));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById('btn-' + tabId).classList.replace('tab-inactive', 'tab-active');
        };

        // --- NAČÍTÁNÍ DAT ---
        function loadData() {
            // CUPPINGY S DOCHÁZKOU
            onSnapshot(collection(db, "cuppings"), (sn) => {
                const list = document.getElementById('cuppingList');
                list.innerHTML = '';
                sn.forEach(d => {
                    const data = d.data();
                    const isAttending = data.attendees?.includes(currentUser.email);
                    const isDeclined = data.declined?.includes(currentUser.email);

                    const card = document.createElement('div');
                    card.className = "bg-white border border-brand-border p-6";
                    
                    // Admin přehled docházky
                    const adminReport = isAdmin ? `
                        <div class="mt-6 pt-6 border-t border-brand-border grid grid-cols-2 gap-4">
                            <div>
                                <div class="text-[10px] font-bold uppercase text-green-700 mb-2">✅ Potvrzeno (${data.attendees?.length || 0})</div>
                                <div class="text-xs space-y-1">${data.attendees?.join('<br>') || 'nikdo'}</div>
                            </div>
                            <div>
                                <div class="text-[10px] font-bold uppercase text-red-700 mb-2">❌ Omluveno (${data.declined?.length || 0})</div>
                                <div class="text-xs space-y-1">${data.declined?.join('<br>') || 'nikdo'}</div>
                            </div>
                        </div>
                    ` : '';

                    card.innerHTML = `
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <div class="text-xs font-bold text-poppy-700 uppercase mb-1 tracking-widest">${data.date} | ${data.time}</div>
                                <h3 class="text-2xl font-extrabold uppercase tracking-tight">${data.title}</h3>
                            </div>
                            <div class="flex gap-2 w-full md:w-auto">
                                <button onclick="updateAttendance('${d.id}', 'yes')" class="flex-1 md:flex-none px-6 py-2 text-xs font-bold uppercase border border-brand-dark transition ${isAttending ? 'bg-brand-dark text-white' : 'hover:bg-brand-dark hover:text-white'}">
                                    Příjdu
                                </button>
                                <button onclick="updateAttendance('${d.id}', 'no')" class="flex-1 md:flex-none px-6 py-2 text-xs font-bold uppercase border border-brand-border text-brand-muted transition ${isDeclined ? 'bg-poppy-700 text-white border-poppy-700' : 'hover:border-brand-dark hover:text-brand-dark'}">
                                    Nepříjdu
                                </button>
                                ${isAdmin ? `<button onclick="deleteDocById('cuppings', '${d.id}')" class="p-2 text-red-500 hover:bg-red-50 transition">🗑️</button>` : ''}
                            </div>
                        </div>
                        ${adminReport}
                    `;
                    list.appendChild(card);
                });
            });

            // KÁVY
            onSnapshot(collection(db, "roasterySets"), (sn) => {
                const list = document.getElementById('roasteryList');
                list.innerHTML = '';
                sn.forEach(d => {
                    const block = d.data();
                    const hasVoted = block.votedBy?.includes(currentUser.uid);
                    const card = document.createElement('div');
                    card.className = "bg-white border border-brand-border p-8";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-8 border-b border-brand-border pb-4">
                            <h3 class="text-2xl font-extrabold uppercase tracking-tight">${block.roasteryName}</h3>
                            ${isAdmin ? `<button onclick="deleteDocById('roasterySets', '${d.id}')" class="text-xs uppercase underline hover:text-poppy-700">Smazat</button>` : ''}
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            ${block.coffees.map((c, i) => `
                                <div class="border border-brand-border p-5 bg-brand-bg relative text-sm group hover:border-brand-dark transition">
                                    <div class="text-[10px] font-bold text-poppy-700 mb-3 uppercase tracking-widest">Vzorek 0${i+1} | ${c.price} Kč/g</div>
                                    <div class="font-extrabold text-base mb-1 uppercase">${c.name}</div>
                                    <div class="text-[10px] text-brand-muted uppercase font-bold tracking-wider">${c.origin} • ${c.variety}</div>
                                    <div class="mt-4 text-[11px] italic text-brand-dark leading-relaxed">"${c.notes}"</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex gap-4 items-center bg-brand-bg p-4 border border-brand-border">
                            <span class="text-[10px] font-bold uppercase tracking-widest mr-auto">${hasVoted ? 'Zahlasováno' : 'Vaše volba:'}</span>
                            <button ${hasVoted ? 'disabled' : `onclick="vote('${d.id}', 'up')"`} class="px-6 py-2 border border-brand-dark font-bold text-xs hover:bg-brand-dark hover:text-white transition">👍 ${block.votesUp || 0}</button>
                            <button ${hasVoted ? 'disabled' : `onclick="vote('${d.id}', 'down')"`} class="px-6 py-2 border border-brand-border text-brand-muted font-bold text-xs hover:border-brand-dark hover:text-brand-dark transition">👎 ${block.votesDown || 0}</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });

            // RECEPTY
            onSnapshot(collection(db, "recipes"), (sn) => {
                const list = document.getElementById('recipeList');
                list.innerHTML = '';
                sn.forEach(d => {
                    const data = d.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 border border-brand-border hover:shadow-sm transition";
                    card.innerHTML = `
                        <div class="flex justify-between mb-4">
                            <span class="text-[10px] font-bold bg-brand-dark text-white px-2 py-1 uppercase tracking-widest">${data.method}</span>
                            <span class="text-[10px] text-brand-muted uppercase font-bold tracking-widest">${data.author.split('@')[0]}</span>
                        </div>
                        <h3 class="text-xl font-extrabold uppercase mb-2 tracking-tight">${data.bean}</h3>
                        <div class="text-sm font-bold mb-4 border-b border-brand-border pb-2 inline-block text-poppy-700 uppercase tracking-wider">${data.ratio}</div>
                        <div class="text-xs text-brand-dark bg-brand-bg p-4 font-medium leading-relaxed">"${data.steps}"</div>
                        ${isAdmin ? `<button onclick="deleteDocById('recipes', '${d.id}')" class="mt-4 text-[10px] uppercase font-bold text-red-500 hover:underline">Smazat</button>` : ''}
                    `;
                    list.appendChild(card);
                });
            });
        }

        // --- AKCE ---
        window.updateAttendance = async (id, status) => {
            const ref = doc(db, "cuppings", id);
            if(status === 'yes') {
                await updateDoc(ref, {
                    attendees: arrayUnion(currentUser.email),
                    declined: arrayRemove(currentUser.email)
                });
            } else {
                await updateDoc(ref, {
                    declined: arrayUnion(currentUser.email),
                    attendees: arrayRemove(currentUser.email)
                });
            }
        };

        window.vote = async (id, type) => {
            const ref = doc(db, "roasterySets", id);
            await updateDoc(ref, {
                [type === 'up' ? 'votesUp' : 'votesDown']: increment(1),
                votedBy: arrayUnion(currentUser.uid)
            });
        };

        window.deleteDocById = async (coll, id) => {
            if(confirm('Tuto položku opravdu smazat?')) await deleteDoc(doc(db, coll, id));
        };

        // --- FORMULÁŘE ---
        document.getElementById('cuppingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "cuppings"), {
                title: document.getElementById('cup_title').value,
                date: document.getElementById('cup_date').value,
                time: document.getElementById('cup_time').value,
                attendees: [],
                declined: []
            });
            e.target.reset();
        });

        document.getElementById('roasteryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const set = {
                roasteryName: document.getElementById('roasteryName').value,
                votesUp: 0, votesDown: 0, votedBy: [],
                coffees: [
                    { name: document.getElementById('c1_name').value, origin: document.getElementById('c1_origin').value, variety: document.getElementById('c1_variety').value, price: document.getElementById('c1_price').value, notes: document.getElementById('c1_notes').value },
                    { name: document.getElementById('c2_name').value, origin: document.getElementById('c2_origin').value, variety: document.getElementById('c2_variety').value, price: document.getElementById('c2_price').value, notes: document.getElementById('c2_notes').value },
                    { name: document.getElementById('c3_name').value, origin: document.getElementById('c3_origin').value, variety: document.getElementById('c3_variety').value, price: document.getElementById('c3_price').value, notes: document.getElementById('c3_notes').value }
                ]
            };
            await addDoc(collection(db, "roasterySets"), set);
            e.target.reset();
        });

        document.getElementById('recipeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "recipes"), {
                bean: document.getElementById('rec_bean').value,
                method: document.getElementById('rec_method').value,
                ratio: document.getElementById('rec_ratio').value,
                steps: document.getElementById('rec_steps').value,
                author: currentUser.email
            });
            e.target.reset();
        });
    </script>
</body>
</html>
